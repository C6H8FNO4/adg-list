name: Extract AdGuard Rules

于:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1️⃣ 生成 v1.0.X 版本号
      - name: Generate Version
        run: |
          git fetch --tags
          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            NEW_VERSION="v1.0.0"
          else
            BASE=$(echo $LAST_TAG | sed 's/^v//')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            PATCH=$((PATCH+1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Generated version: $NEW_VERSION"

      # 2️⃣ 仓库信息
      - name: Prepare Variables
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.%3NZ")

          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV

      # 3️⃣ 下载 YAML
      - name: Download YAML
        run: |
          curl -L "https://raw.githubusercontent.com/C6H8FNO4/Adguard-Home-For-Magisk-Mod/main/Adguardhome/bin/AdGuardHome.yaml" -o source.yaml

      # 4️⃣ 提取 user_rules（去除 YAML 标记）
      - name: Extract Rules
        run: |
          awk '
          /user_rules:/ {flag=1; next}
          flag && /^[^ ]/ {flag=0}
          flag && /-/ {
              gsub(/^[ \t-]+/, "")
              gsub(/^'\''|'\''$/, "")
              print
          }
          ' source.yaml > extracted_rules.txt

      # 5️⃣ 生成最终 rules.txt
      - name: Generate Final File
        run: |
          cat > rules.txt << EOF
!
! Title: ${REPO_NAME}
! Description: Auto generated filter
! Version: ${VERSION}
! Homepage: ${REPO_URL}
! Last modified: ${TIMESTAMP}
!
! Compiled by @${REPO_NAME} ${VERSION}
!
EOF
          cat extracted_rules.txt >> rules.txt

      # 6️⃣ 创建并推送 Tag
      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $VERSION
          git push origin $VERSION

      # 7️⃣ 上传 rules.txt
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VERSION }}
          path: rules.txt
