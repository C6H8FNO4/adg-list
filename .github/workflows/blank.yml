name: Extract user_rules with header and Create Release

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: '目标仓库 (格式: owner/repo)'
        required: true
        default: 'C6H8FNO4/Adguard-Home-For-Magisk-Mod'
      file_path:
        description: 'YAML 文件路径 (相对于仓库根目录)'
        required: true
        default: 'Adguardhome/bin/AdGuardHome.yaml'
      branch:
        description: '分支名'
        required: true
        default: 'main'
      tag_prefix:
        description: 'Release 标签前缀'
        required: false
        default: 'rules-'
      include_full_content:
        description: '是否在 Release 描述中包含完整内容 (yes/no)'
        required: false
        default: 'no'
      title:
        description: '规则列表标题 (Title)'
        required: false
        default: 'Extracted AdGuard Rules'
      description:
        description: '规则列表描述 (Description)'
        required: false
        default: 'User rules extracted from AdGuardHome.yaml'
      homepage:
        description: '主页地址 (Homepage)'
        required: false
        default: 'https://github.com/C6H8FNO4/Adguard-Home-For-Magisk-Mod'

permissions:
  contents: write

jobs:
  extract-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          sudo snap install yq

      - name: Download YAML file
        id: download
        run: |
          REPO="${{ github.event.inputs.source_repo }}"
          FILE_PATH="${{ github.event.inputs.file_path }}"
          BRANCH="${{ github.event.inputs.branch }}"
          RAW_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/${FILE_PATH}"
          curl -L -o downloaded_file.yaml "$RAW_URL"
          echo "file=downloaded_file.yaml" >> $GITHUB_OUTPUT

      - name: Extract user_rules
        id: extract
        run: |
          yq eval '.user_rules' downloaded_file.yaml > user_rules_content.txt
          {
            echo 'RULES_RAW<<EOF'
            cat user_rules_content.txt
            echo EOF
          } >> $GITHUB_ENV

      - name: Generate rules.txt with header
        id: generate_file
        run: |
          # 自动生成版本号 v1.0.X
          git fetch --tags
          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            VERSION="v1.0.0"
          else
            BASE=$(echo $LAST_TAG | sed 's/^v//')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            PATCH=$((PATCH+1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          LAST_MODIFIED=$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')
          OUTPUT_FILE="rules.txt"
          {
            echo "! Title: ${{ github.event.inputs.title }}"
            echo "! Description: ${{ github.event.inputs.description }}"
            echo "! Version: $VERSION"
            echo "! Homepage: ${{ github.event.inputs.homepage }}"
            echo "! Last modified: $LAST_MODIFIED"
            echo "!"
            echo "! Compiled by @${{ github.actor }} $VERSION"
            echo "!"
            cat user_rules_content.txt
          } > "$OUTPUT_FILE"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "file=$OUTPUT_FILE" >> $GITHUB_OUTPUT
          {
            echo 'FULL_CONTENT<<EOF'
            cat "$OUTPUT_FILE"
            echo EOF
          } >> $GITHUB_ENV

      - name: Generate tag and release name
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag_prefix }}${{ env.VERSION }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "release_name=Extracted user_rules ${{ env.VERSION }}" >> $GITHUB_OUTPUT

      - name: Create Release using GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="**Extracted user_rules from** \`${{ github.event.inputs.source_repo }}\` **at** \`${{ github.event.inputs.file_path }}\`\n\n"
          BODY+="**Header Info:**\n"
          BODY+="- Title: ${{ github.event.inputs.title }}\n"
          BODY+="- Description: ${{ github.event.inputs.description }}\n"
          BODY+="- Version: ${{ env.VERSION }}\n"
          BODY+="- Homepage: ${{ github.event.inputs.homepage }}\n"
          BODY+="- Last modified: $(date -u +'%Y-%m-%dT%H:%M:%S.000Z')\n"
          BODY+="- Compiled by: @${{ github.actor }}\n\n"
          if [[ "${{ github.event.inputs.include_full_content }}" == "yes" ]]; then
            BODY+="\`\`\`\n${{ env.FULL_CONTENT }}\n\`\`\`"
          else
            BODY+="Full content attached as file with header."
          fi
          echo -e "$BODY" > release_body.md

          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.release_name }}" \
            --notes-file release_body.md \
            "./${{ steps.generate_file.outputs.file }}"
