name: Build AdGuard Rules

on:
  workflow_dispatch:
    inputs:
      yaml_url:
        description: 'AdGuardHome.yaml URL (optional)'
        required: false
      version:
        description: 'Version (x.y.z), leave empty to auto increment'
        required: false
      description:
        description: 'Custom description (optional)'
        required: false

  schedule:
    - cron: '* * * * *'    # 每分钟运行一次构建
    - cron: '0 0 * * *'    # 每天 UTC 0:00 创建 Release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run build script
        id: build_step
        run: |
          python scripts/build.py \
            "${{ github.event.inputs.yaml_url }}" \
            "${{ github.event.inputs.version }}" \
            "${{ github.event.inputs.description }}"

      - name: Commit updated rules.txt
        if: github.event_name == 'schedule' && github.event.schedule != '0 0 * * *'  # 每分钟更新，不创建 Release
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add rules.txt
          git commit -m "Update rules.txt [auto commit]"
          git push

      - name: Create daily Release
        if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * *'  # 仅每天 UTC 0:00
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.build_step.outputs.version }}
          name: v${{ steps.build_step.outputs.version }}
          files: rules.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
